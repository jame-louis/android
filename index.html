<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Android程序设计与应用</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <style>
            :root {
                --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                --hero-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                background-color: #f8f9fa;
            }

            /* Hero Section */
            .hero {
                background: var(--hero-bg);
                padding: 80px 0 100px;
                position: relative;
                overflow: hidden;
            }

            .hero::before {
                content: '';
                position: absolute;
                top: -50%;
                right: -20%;
                width: 600px;
                height: 600px;
                background: rgba(102, 126, 234, 0.1);
                border-radius: 50%;
            }

            .hero::after {
                content: '';
                position: absolute;
                bottom: -30%;
                left: -10%;
                width: 400px;
                height: 400px;
                background: rgba(118, 75, 162, 0.1);
                border-radius: 50%;
            }

            .hero-content {
                position: relative;
                z-index: 1;
            }

            .hero-icon {
                width: 80px;
                height: 80px;
                background: var(--primary-gradient);
                border-radius: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 24px;
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            }

            .hero-icon i {
                font-size: 2.5rem;
                color: white;
            }

            .hero h1 {
                color: white;
                font-size: 2.5rem;
                font-weight: 700;
                margin-bottom: 12px;
            }

            .hero p {
                color: rgba(255, 255, 255, 0.7);
                font-size: 1.1rem;
                margin-bottom: 0;
            }

            /* Content Section */
            .content-section {
                margin-top: -50px;
                position: relative;
                z-index: 2;
                padding-bottom: 60px;
            }

            .course-card {
                background: white;
                border-radius: 16px;
                padding: 30px;
                height: 100%;
                border: none;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
                transition: all 0.3s ease;
                text-decoration: none;
                color: inherit;
                display: flex;
                flex-direction: column;
            }

            .course-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 40px rgba(102, 126, 234, 0.2);
            }

            .card-icon {
                width: 56px;
                height: 56px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 20px;
            }

            .card-icon i {
                font-size: 1.5rem;
            }

            .icon-purple {
                background: rgba(102, 126, 234, 0.1);
                color: #667eea;
            }

            .icon-blue {
                background: rgba(13, 202, 240, 0.1);
                color: #0dcaf0;
            }

            .icon-pink {
                background: rgba(214, 51, 132, 0.1);
                color: #d63384;
            }

            .course-card h3 {
                font-size: 1.25rem;
                font-weight: 600;
                color: #333;
                margin-bottom: 8px;
            }

            .course-card p {
                color: #6c757d;
                font-size: 0.95rem;
                margin-bottom: 20px;
                flex-grow: 1;
            }

            .card-arrow {
                display: flex;
                align-items: center;
                color: #667eea;
                font-weight: 500;
                font-size: 0.9rem;
            }

            .card-arrow i {
                margin-left: 6px;
                transition: transform 0.3s ease;
            }

            .course-card:hover .card-arrow i {
                transform: translateX(4px);
            }

            /* Footer */
            footer {
                background: #1a1a2e;
                color: rgba(255, 255, 255, 0.7);
                padding: 40px 0;
            }

            footer a {
                color: rgba(255, 255, 255, 0.7);
                text-decoration: none;
                transition: color 0.3s ease;
            }

            footer a:hover {
                color: white;
            }

            @media (max-width: 768px) {
                .hero {
                    padding: 60px 0 80px;
                }

                .hero h1 {
                    font-size: 1.75rem;
                }

                .course-card {
                    padding: 24px;
                }
            }
        </style>
    </head>
    <body>
        <!-- Hero Header -->
        <header class="hero">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8 text-center hero-content">
                        <div class="hero-icon">
                            <i class="bi bi-android2"></i>
                        </div>
                        <h1>Android程序设计与应用</h1>
                        <p>掌握 Android 开发技能，从入门到精通</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Section with Cards -->
        <section class="content-section">
            <div class="container">
                <div class="row g-4">
                    <!-- Skill Tree Card -->
                    <div class="col-md-4">
                        <a href="skill/index.html" class="course-card">
                            <div class="card-icon icon-purple">
                                <i class="bi bi-diagram-3"></i>
                            </div>
                            <h3>Android 技能树</h3>
                            <p>系统化学习 Android 开发的核心知识点，构建完整的技术体系。</p>
                            <div class="card-arrow">
                                开始学习 <i class="bi bi-arrow-right"></i>
                            </div>
                        </a>
                    </div>

                    <!-- LinearLayout Card -->
                    <div class="col-md-4">
                        <a href="/android/slidev/lecture09/index.html" class="course-card">
                            <div class="card-icon icon-blue">
                                <i class="bi bi-layout-wtf"></i>
                            </div>
                            <h3>LinearLayout 教程</h3>
                            <p>深入学习 LinearLayout 布局的使用方法和最佳实践。</p>
                            <div class="card-arrow">
                                开始学习 <i class="bi bi-arrow-right"></i>
                            </div>
                        </a>
                    </div>

                    <!-- Image Browser Card -->
                    <div class="col-md-4">
                        <a href="/android/slidev/lecture10/index.html" class="course-card">
                            <div class="card-icon icon-pink">
                                <i class="bi bi-images"></i>
                            </div>
                            <h3>图片浏览器</h3>
                            <p>从零开始构建一个完整的图片浏览器应用，掌握实际项目开发技能。</p>
                            <div class="card-arrow">
                                开始学习 <i class="bi bi-arrow-right"></i>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-4">
                        <a href="/android/misc/image-browser-android-app.html" class="course-card">
                            <div class="card-icon icon-pink">
                                <i class="bi bi-images"></i>
                            </div>
                            <h3>图片浏览器教程</h3>
                            <div class="card-arrow">
                                开始学习 <i class="bi bi-arrow-right"></i>
                            </div>
                        </a>
                    </div>
                    <!-- ConstraintLayout -->
                    <div class="col-md-4">
                        <a href="/android/slidev/lecture11/index.html" class="course-card">
                            <div class="card-icon icon-pink">
                                <i class="bi bi-images"></i>
                            </div>
                            <h3>约束布局</h3>
                            <p>深入学习 ConstraintLayout 布局的使用方法和最佳实践。</p>
                            <div class="card-arrow">
                                开始学习 <i class="bi bi-arrow-right"></i>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                        <span class="fw-semibold">Android程序设计与应用</span>
                        <span class="mx-2">·</span>
                        <span>学习、实践、成长</span>
                    </div>
                    <div class="col-md-6 text-center text-md-end">
                        <a href="#" class="me-3"><i class="bi bi-github"></i></a>
                        <a href="#" class="me-3"><i class="bi bi-envelope"></i></a>
                        <a href="#"><i class="bi bi-info-circle"></i></a>
                    </div>
                </div>
            </div>
        </footer>
    </body>
</html>
