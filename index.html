<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Android程序设计与应用</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .container {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                padding: 50px;
                max-width: 600px;
                width: 100%;
            }

            h1 {
                color: #333;
                font-size: 2rem;
                margin-bottom: 10px;
                text-align: center;
            }

            .subtitle {
                color: #666;
                text-align: center;
                margin-bottom: 30px;
                font-size: 0.95rem;
            }

            .link-list {
                list-style: none;
            }

            .link-list li {
                margin-bottom: 15px;
            }

            .link-list a {
                display: flex;
                align-items: center;
                padding: 18px 20px;
                background: #f8f9fa;
                border-radius: 12px;
                text-decoration: none;
                color: #333;
                font-weight: 500;
                transition: all 0.3s ease;
                border: 2px solid transparent;
            }

            .link-list a:hover {
                background: #fff;
                border-color: #667eea;
                transform: translateX(5px);
                box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            }

            .link-list a::before {
                content: "→";
                margin-right: 12px;
                color: #667eea;
                font-weight: bold;
                transition: transform 0.3s ease;
            }

            .link-list a:hover::before {
                transform: translateX(3px);
            }

            @media (max-width: 480px) {
                .container {
                    padding: 30px 20px;
                }

                h1 {
                    font-size: 1.5rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Android程序设计与应用</h1>

                <li><a href="/android/slidev/lecture10/index.html">从头开始构建图片浏览器</a></li>
            </ul>
        </div>
    </body>
</html>
