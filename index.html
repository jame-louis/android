<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Android程序设计与应用</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <style>
            :root {
                --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }

            body {
                background: var(--primary-gradient);
                min-height: 100vh;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            }

            .main-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border: none;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            }

            .course-link {
                display: flex;
                align-items: center;
                padding: 1.25rem;
                background: #f8f9fa;
                border-radius: 12px;
                text-decoration: none;
                color: #333;
                font-weight: 500;
                transition: all 0.3s ease;
                border: 2px solid transparent;
            }

            .course-link:hover {
                background: #fff;
                border-color: #667eea;
                transform: translateX(5px);
                box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            }

            .course-link i {
                color: #667eea;
                font-size: 1.25rem;
                margin-right: 12px;
            }

            .header-icon {
                width: 64px;
                height: 64px;
                background: var(--primary-gradient);
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 1rem;
                box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            }

            .header-icon i {
                font-size: 2rem;
                color: white;
            }

            @media (max-width: 576px) {
                .main-card {
                    margin: 1rem;
                    padding: 1.5rem !important;
                }
            }
        </style>
    </head>
    <body class="d-flex align-items-center justify-content-center p-3">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card main-card p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="header-icon">
                                <i class="bi bi-android2"></i>
                            </div>
                            <h1 class="fw-bold text-dark mb-2">Android程序设计与应用</h1>
                            <p class="text-muted mb-0">选择一个课程开始学习</p>
                        </div>

                        <div class="list-group list-group-flush gap-3">
                            <a href="skill/index.html" class="course-link">
                                <i class="bi bi-diagram-3"></i>
                                <span>Android 技能树</span>
                                <i class="bi bi-chevron-right ms-auto text-muted"></i>
                            </a>

                            <a href="/android/slidev/lecture09/index.html" class="course-link">
                                <i class="bi bi-layout-wtf"></i>
                                <span>LinearLayout 教程</span>
                                <i class="bi bi-chevron-right ms-auto text-muted"></i>
                            </a>

                            <a href="/android/slidev/lecture10/index.html" class="course-link">
                                <i class="bi bi-images"></i>
                                <span>从头开始构建图片浏览器</span>
                                <i class="bi bi-chevron-right ms-auto text-muted"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
